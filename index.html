<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-inner">
      <span class="app-title">Expense &amp; Budget Visualizer</span>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
        <span class="theme-toggle-text">Dark Mode</span>
      </button>
    </div>
  </header>

  <main class="app-main">

    <!-- ===== BALANCE SECTION ===== -->
    <section class="section balance-section" aria-label="Total Balance">
      <div class="balance-display">
        <span class="balance-label">Total Balance</span>
        <span class="balance-amount" id="balance-amount">$0.00</span>
      </div>
    </section>

    <!-- ===== TRANSACTION FORM SECTION ===== -->
    <section class="section form-section" aria-labelledby="form-heading">
      <h2 id="form-heading" class="section-title">Add Transaction</h2>

      <form id="transaction-form" novalidate>
        <div class="form-group">
          <label for="input-name">Item Name</label>
          <input
            type="text"
            id="input-name"
            name="name"
            placeholder="e.g. Coffee"
            autocomplete="off"
          />
          <span class="field-error" id="error-name" role="alert" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="input-amount">Amount ($)</label>
          <input
            type="number"
            id="input-amount"
            name="amount"
            placeholder="0.00"
            min="0.01"
            step="0.01"
          />
          <span class="field-error" id="error-amount" role="alert" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="input-category">Category</label>
          <select id="input-category" name="category">
            <option value="">-- Select a category --</option>
          </select>
          <span class="field-error" id="error-category" role="alert" aria-live="polite"></span>
        </div>

        <button type="submit" class="btn btn-primary">Add Transaction</button>
      </form>

      <!-- Add Custom Category sub-form -->
      <div class="custom-category-form">
        <h3 class="subsection-title">Add Custom Category</h3>
        <div class="form-group">
          <label for="input-custom-category">Category Name</label>
          <input
            type="text"
            id="input-custom-category"
            name="custom-category"
            placeholder="e.g. Healthcare"
            autocomplete="off"
          />
          <span class="field-error" id="error-custom-category" role="alert" aria-live="polite"></span>
        </div>
        <button type="button" class="btn btn-primary" id="btn-add-category">Add Category</button>
      </div>
    </section>

    <!-- ===== TRANSACTION LIST SECTION ===== -->
    <section class="section list-section" aria-labelledby="list-heading">
      <h2 id="list-heading" class="section-title">Transaction History</h2>
      <div class="transaction-list" id="transaction-list" role="list">
        <p class="empty-state" id="empty-state-list">No transactions yet. Add one above!</p>
      </div>
    </section>

    <!-- ===== CHART SECTION ===== -->
    <section class="section chart-section" aria-labelledby="chart-heading">
      <h2 id="chart-heading" class="section-title">Spending by Category</h2>
      <div class="chart-container">
        <canvas id="spending-chart" aria-label="Pie chart of spending by category" role="img"></canvas>
        <p class="empty-state chart-empty-state" id="empty-state-chart">Add transactions to see the chart.</p>
      </div>
    </section>

    <!-- ===== MONTHLY SUMMARY SECTION ===== -->
    <section class="section summary-section" aria-labelledby="summary-heading">
      <h2 id="summary-heading" class="section-title">Monthly Summary</h2>
      <div id="monthly-summary">
        <p class="empty-state" id="empty-state-summary">No transactions to summarize yet.</p>
      </div>
    </section>

  </main>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
